<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Pertamaku</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 60px auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      color: #1565c0;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.7;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #1565c0;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Halo, ini website pertamaku</h1>
    <p>Aku sedang belajar bikin website gratis dari nol.</p>
    <p>Website ini dibuat langsung dari browser dan dideploy ke GitHub Pages.</p>
    <a class="btn" href="https://github.com" target="_blank">Buka GitHub</a>
  </div>
</body>
</html>
